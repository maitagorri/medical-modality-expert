# ms-swift continual pre-training config — CXR (report generation)
# Stage 1: train the model to predict radiology report text given a CXR image.
# CPU-only, fp32 for stability. Run with: swift sft --config configs/pretrain_cxr.yaml

model: /home/maita/.cache/huggingface/hub/models--Qwen--Qwen3-VL-2B-Instruct/snapshots/89644892e4d85e24eaac8bacfd4f463576704203

# LoRA
tuner_type: lora
lora_rank: 8
lora_alpha: 16
target_modules: all-linear
lora_dropout: 0.05

# Dataset
dataset:
  - data/processed/chexpert_plus/train_pretrain.jsonl
val_dataset:
  - data/processed/chexpert_plus/val_pretrain.jsonl

# Output
output_dir: outputs/cxr_pretrain
run_name: cxr-pretrain

# Hyperparameters
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_length: 512
max_pixels: 200704

# CPU / precision — no GPU, fp32 for numerical stability. No quantization —
# bitsandbytes has no CPU backend.
fp16: false
bf16: false

# Memory management for CPU training
gradient_checkpointing: true   # recompute activations on backward pass to save RAM
dataloader_num_workers: 0      # prevent subprocesses from each loading the model

# Checkpointing — frequent saves in case of interruption
save_steps: 10
logging_steps: 5
eval_steps: 25
save_total_limit: 3


# Logging
report_to: none
