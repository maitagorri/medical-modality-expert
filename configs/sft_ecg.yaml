# ms-swift supervised fine-tuning config — ECG
# Stage 2: starting from ecg_pretrain checkpoint, continue on PTB-XL superclass labels.
# CPU-only, fp32 for stability. Run with: swift sft --config configs/sft_ecg.yaml

model: Qwen/Qwen3-VL-2B-Instruct

# Resume from pre-training checkpoint
# Uncomment and set path after pretrain completes:
# adapter_path: outputs/ecg_pretrain/checkpoint-final

# LoRA — same rank as pretrain to allow checkpoint continuation
train_type: lora
lora_rank: 8
lora_alpha: 16
lora_target_modules: all-linear
lora_dropout: 0.05

# Dataset
dataset:
  - data/processed/ptbxl/train.jsonl
val_dataset:
  - data/processed/ptbxl/val.jsonl

# Output
output_dir: outputs/ecg_sft
run_name: ecg-sft

# Hyperparameters — lower LR for fine-tuning from pretrained checkpoint
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_length: 256

# CPU / precision — no GPU, fp32 for numerical stability
fp16: false
bf16: false

# Checkpointing — frequent saves in case of interruption
save_steps: 10
logging_steps: 5
eval_steps: 25
save_total_limit: 3

# Logging
report_to: wandb
